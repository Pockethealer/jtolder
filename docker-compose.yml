version: '3.8'

services:
  # The PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: jtolder_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # PgAdmin GUI
  pgadmin:
    image: dpage/pgadmin4
    container_name: jtolder_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@yomi.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin-data: